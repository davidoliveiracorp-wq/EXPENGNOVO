name: Daily snapshot do estado compartilhado

# Roda diariamente às 03:00 UTC (= 00:00 BRT no horário padrão) e baixa o
# JSON atual do Vercel Blob via /api/sync, commitando em data/snapshot-YYYY-MM-DD.json
# no master. Histórico Git serve como backup/auditoria gratuita.
#
# Mantém os últimos 30 snapshots; arquivos mais antigos são removidos para
# evitar inchaço do repositório.

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC = 00:00 BRT
  workflow_dispatch:        # também roda manualmente pelo botão "Run workflow" na aba Actions

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Baixar estado atual do servidor
        id: fetch
        env:
          APP_URL: https://expengnovo.vercel.app
        run: |
          set -euo pipefail
          mkdir -p data
          DATE=$(date -u +%Y-%m-%d)
          FILE="data/snapshot-${DATE}.json"

          HTTP_CODE=$(curl -sS -o "$FILE" -w "%{http_code}" "${APP_URL}/api/sync" || echo "000")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::API /api/sync retornou HTTP $HTTP_CODE"
            echo "Conteúdo:"
            cat "$FILE" || true
            rm -f "$FILE"
            exit 1
          fi

          # Se payload for null (servidor sem dados), pula sem commitar
          if jq -e '.payload == null' "$FILE" >/dev/null 2>&1; then
            echo "::warning::Servidor sem dados (payload=null) — nada a snapshot."
            rm -f "$FILE"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Reformata em JSON indentado para diffs git mais legíveis
          jq '.' "$FILE" > "${FILE}.tmp" && mv "${FILE}.tmp" "$FILE"

          SIZE=$(wc -c < "$FILE")
          echo "Snapshot ${DATE}: ${SIZE} bytes"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Retém apenas os 30 snapshots mais recentes
        if: steps.fetch.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # Lista snapshots ordenados por nome (ordem cronológica) e remove
          # os mais antigos quando há mais de 30.
          cd data
          COUNT=$(ls -1 snapshot-*.json 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 30 ]; then
            ls -1 snapshot-*.json | sort | head -n $((COUNT - 30)) | xargs -r rm -v
          fi

      - name: Commit e push
        if: steps.fetch.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/
          if git diff --cached --quiet; then
            echo "Sem mudanças (snapshot idêntico ao último)."
            exit 0
          fi
          git commit -m "chore(data): snapshot ${{ steps.fetch.outputs.date }}"
          git push
